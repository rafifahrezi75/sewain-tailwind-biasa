<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Sewa Alat - SewaIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
        }

        .cartoon-accent-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 0.1);
            border: 1.5px solid #E2E8F0;
        }

        .btn-cartoon-buy {
            box-shadow: 4px 4px 0px 0px #1E3A8A;
            transition: all 0.2s;
        }

        .btn-cartoon-buy:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px #1E3A8A;
        }

        .text-primary {
            color: #1E3A8A;
        }

        .bg-primary {
            background-color: #1E3A8A;
        }

        .bg-aksen {
            background-color: #14B8A6;
        }
    </style>
</head>

<body class="pb-20">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="javascript:history.back()"
                class="flex items-center gap-2 text-slate-500 hover:text-primary transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span class="text-sm font-bold uppercase italic">Kembali</span>
            </a>
            <span class="text-xs font-black text-slate-400 tracking-[0.2em] uppercase italic">Detail Produk</span>
            <div class="w-8"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="contentLoading" class="text-center py-20 font-black text-slate-300 italic uppercase">Memuat Data
            Alat...</div>

        <div id="mainContent" class="hidden flex flex-col lg:flex-row gap-12">
            <div class="w-full lg:w-1/2">
                <div class="bg-white rounded-[2rem] p-6 cartoon-accent-shadow sticky top-24">
                    <div
                        class="bg-slate-50 rounded-[1.5rem] aspect-square flex items-center justify-center mb-6 overflow-hidden">
                        <i id="alatIcon" data-lucide="chef-hat" class="w-40 h-40 text-slate-200"></i>
                    </div>
                    <div class="flex gap-4">
                        <div
                            class="w-20 h-20 bg-white rounded-2xl border-2 border-aksen flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(20,184,166,0.2)]">
                            <i data-lucide="image" class="w-6 h-6 text-aksen"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-1/2 space-y-8">
                <div>
                    <span id="alatKategori"
                        class="bg-yellow-300 text-black text-[9px] font-black px-3 py-1 rounded-lg uppercase italic border border-black/10">Kategori</span>
                    <h1 id="alatNama" class="text-4xl font-black text-slate-900 mt-4 leading-tight italic">Nama Alat
                    </h1>
                    <div
                        class="flex items-center gap-4 mt-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <div class="flex items-center gap-1.5"><i data-lucide="star"
                                class="w-4 h-4 text-orange-400 fill-orange-400"></i> 4.9 (Terpopuler)</div>
                        <div class="flex items-center gap-1.5"><i data-lucide="check-circle-2"
                                class="w-4 h-4 text-aksen"></i> Siap Pakai</div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
                    <h3 class="font-black text-slate-900 mb-5 text-xs uppercase italic tracking-wider">Spesifikasi &
                        Deskripsi</h3>
                    <p id="alatDeskripsi" class="text-xs text-slate-500 font-bold mb-6 italic leading-relaxed">Deskripsi
                        alat akan muncul di sini.</p>
                    <ul id="alatSpek"
                        class="grid grid-cols-2 gap-y-4 text-[11px] text-slate-600 font-bold uppercase italic">
                    </ul>
                </div>

                <div class="bg-white rounded-[2rem] p-8 border border-slate-100 shadow-xl shadow-blue-900/5 max-w-md">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <p class="text-slate-400 text-[9px] font-black uppercase tracking-[0.2em] mb-1">Harga Sewa
                            </p>
                            <h2 class="text-3xl font-black text-primary italic"><span id="alatHarga">Rp0</span> <span
                                    class="text-xs font-bold text-slate-300">/ hari</span></h2>
                        </div>
                        <div
                            class="bg-teal-50 text-aksen text-[9px] font-black px-3 py-1.5 rounded-lg border border-teal-100 uppercase">
                            Tersedia</div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <label
                                class="block text-[9px] font-black text-slate-400 uppercase mb-3 ml-1 tracking-[0.2em]">Jumlah
                                Unit</label>
                            <div class="flex items-center bg-slate-50 rounded-2xl p-2 border border-slate-200">
                                <button onclick="changeDetailQty(-1)"
                                    class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-primary font-bold text-xl transition-transform active:scale-90">-</button>
                                <input type="number" id="detailQtyInput" value="1" min="1"
                                    class="w-full bg-transparent text-center text-xl font-black text-slate-900 outline-none"
                                    readonly>
                                <button onclick="changeDetailQty(1)"
                                    class="w-12 h-12 flex items-center justify-center text-slate-400 hover:text-primary font-bold text-xl transition-transform active:scale-90">+</button>
                            </div>
                        </div>

                        <div class="flex gap-4 pt-2">
                            <button onclick="tambahKeKeranjangDetail()"
                                class="flex-1 bg-white border-2 border-slate-200 text-slate-600 py-4 rounded-2xl font-black text-[10px] flex items-center justify-center gap-2 hover:bg-slate-50 transition-all uppercase italic">
                                <i data-lucide="shopping-bag" class="w-4 h-4"></i> + Keranjang
                            </button>
                            <button onclick="sewaSekarangLangsung()"
                                class="flex-[2] bg-primary text-white py-4 rounded-2xl font-black text-[10px] tracking-widest btn-cartoon-buy uppercase italic">
                                SEWA SEKARANG
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // DATA PRODUK (Harus sama dengan di katalog)
        const dataProduk = [
            { id: 1, nama: 'Mixer Planeteri 10L Professional', harga: 75000, kategori: 'Bakery & Pastry', icon: 'chef-hat', desc: 'Mixer kapasitas besar untuk adonan kalis sempurna.', spek: ['550 Watt', '10 Liter', '15 Kg', 'Garansi Unit'] },
            { id: 2, nama: 'Oven Deck Otomatis Gas', harga: 120000, kategori: 'Bakery & Pastry', icon: 'flame', desc: 'Oven gas otomatis dengan pengatur suhu digital.', spek: ['LPG Gas', '1 Deck', '40 Kg', 'Timer Otomatis'] },
            { id: 3, nama: 'Penggiling Daging Industri', harga: 55000, kategori: 'Pengolah Makanan', icon: 'utensils', desc: 'Sangat tajam, cocok untuk bakso dan sosis.', spek: ['700 Watt', 'Stainless', '12 Kg', 'Food Grade'] },
            { id: 5, nama: 'Traktor Mini Pertanian', harga: 250000, kategori: 'Alat Mesin', icon: 'tractor', desc: 'Traktor bertenaga untuk lahan sempit dan luas.', spek: ['Diesel', '4-Roda', '200 Kg', 'Siap Pakai'] }
        ];

        let currentAlat = null;

        function initDetail() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            currentAlat = dataProduk.find(p => p.id === id);

            if (currentAlat) {
                document.getElementById('contentLoading').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

                // Isi Data
                document.getElementById('alatNama').innerText = currentAlat.nama;
                document.getElementById('alatKategori').innerText = currentAlat.kategori;
                document.getElementById('alatHarga').innerText = "Rp" + currentAlat.harga.toLocaleString('id-ID');
                document.getElementById('alatDeskripsi').innerText = currentAlat.desc;

                // Ganti Icon (Lucide perlu re-create)
                const iconElem = document.getElementById('alatIcon');
                iconElem.setAttribute('data-lucide', currentAlat.icon);

                // Isi Spek
                const spekContainer = document.getElementById('alatSpek');
                const icons = ['zap', 'container', 'weight', 'shield-check'];
                spekContainer.innerHTML = currentAlat.spek.map((s, i) => `
                    <li class="flex items-center gap-3">
                        <div class="p-1.5 bg-blue-50 rounded-lg"><i data-lucide="${icons[i] || 'info'}" class="w-4 h-4 text-primary"></i></div> ${s}
                    </li>
                `).join('');

                lucide.createIcons();
            } else {
                document.getElementById('contentLoading').innerText = "Alat tidak ditemukan!";
            }
        }

        function changeDetailQty(delta) {
            const input = document.getElementById('detailQtyInput');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            input.value = val;
        }

        // Tombol TAMBAH KE KERANJANG (Biasa)
        function tambahKeKeranjangDetail() {
            // Hapus mode langsung jika ada, karena user memilih jalur keranjang biasa
            localStorage.removeItem('mode_checkout');

            const qty = parseInt(document.getElementById('detailQtyInput').value);
            let keranjang = JSON.parse(localStorage.getItem('keranjangSewaIn')) || [];
            // ... logika simpan ke keranjangSewaIn ...
            alert("Masuk keranjang!");
        }

        // Tombol SEWA SEKARANG (Jalur Cepat)
        function sewaSekarangLangsung() {
            const qty = parseInt(document.getElementById('detailQtyInput').value);
            const produkSingle = [{ ...currentAlat, qty: qty, durasi: 1 }];

            localStorage.setItem('checkout_cepat', JSON.stringify(produkSingle));
            localStorage.setItem('mode_checkout', 'langsung'); // SET PENANDA DI SINI

            window.location.href = 'checkout.html';
        }

        function updateNavbarProfil() {
            const userData = JSON.parse(localStorage.getItem('userSewaIn'));
            const authContainer = document.getElementById('authContainer'); // ID div tempat tombol login/profil

            if (userData && userData.isLogin) {
                // Jika sudah login, tampilkan tombol Profil
                authContainer.innerHTML = `
            <div class="flex items-center gap-3 bg-white p-1 pr-4 rounded-full border-2 border-slate-100 shadow-sm">
                <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center text-white">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
                <button onclick="bukaModalProfil()" class="text-[10px] font-black uppercase italic text-slate-900">
                    ${userData.nama}
                </button>
                <button onclick="logout()" class="text-red-500 hover:text-red-700">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        `;
            }
            lucide.createIcons();
        }

        function logout() {
            localStorage.removeItem('userSewaIn');
            location.reload();
        }

        window.onload = initDetail;

    </script>
</body>

</html>
