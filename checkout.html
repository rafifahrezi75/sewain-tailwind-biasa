<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - SewaIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
        }

        .cartoon-accent-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 0.05);
            border: 1.5px solid #E2E8F0;
        }

        .btn-cartoon-buy {
            box-shadow: 4px 4px 0px 0px #1E3A8A;
            transition: all 0.2s;
        }

        .btn-cartoon-buy:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px #1E3A8A;
        }

        .text-primary {
            color: #1E3A8A;
        }

        .bg-primary {
            background-color: #1E3A8A;
        }

        .bg-aksen {
            background-color: #14B8A6;
        }
    </style>
</head>

<body class="pb-20">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="keranjang.html"
                class="flex items-center gap-2 text-slate-500 hover:text-primary transition-all font-bold uppercase italic text-xs">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                <span>Kembali</span>
            </a>
            <span class="text-sm font-black text-slate-900 tracking-tighter uppercase italic">Checkout Pesanan</span>
            <div class="w-8"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">

            <div class="lg:col-span-7 space-y-6">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-blue-100 rounded-xl text-primary"><i data-lucide="shopping-bag"
                            class="w-5 h-5"></i></div>
                    <h3 class="font-black text-slate-900 uppercase italic">Tinjau Pesanan</h3>
                </div>

                <div id="checkoutList" class="space-y-4"></div>

                <div class="bg-white rounded-[2rem] p-8 border border-slate-100 shadow-sm space-y-6">
                    <div class="flex items-center gap-2">
                        <i data-lucide="calendar" class="w-4 h-4 text-primary"></i>
                        <h4 class="text-xs font-black uppercase italic text-slate-900">Periode Sewa</h4>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Tanggal Mulai</label>
                            <input type="date" id="startDate" onchange="calculateDuration()"
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold outline-none focus:border-aksen transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Tanggal Selesai</label>
                            <input type="date" id="endDate" onchange="calculateDuration()"
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold outline-none focus:border-aksen transition-all">
                        </div>
                    </div>
                    <div id="durationBadge" class="hidden">
                        <span
                            class="bg-blue-100 text-primary text-[10px] font-black px-4 py-2 rounded-full uppercase italic">
                            Total Durasi: <span id="daysCount">0</span> Hari
                        </span>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="bg-white rounded-[2rem] p-8 cartoon-accent-shadow sticky top-24 space-y-8">

                    <div class="space-y-4">
                        <div class="flex items-center gap-2 mb-4">
                            <i data-lucide="user" class="w-4 h-4 text-primary"></i>
                            <h4 class="text-xs font-black uppercase italic text-slate-900">Data Penyewa</h4>
                        </div>
                        <input type="text" id="userName" placeholder="Nama Lengkap / UMKM"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold outline-none focus:border-aksen transition-all">
                        <input type="tel" id="userPhone" placeholder="Nomor WhatsApp"
                            class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold outline-none focus:border-aksen transition-all">
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-center gap-2 mb-4">
                            <i data-lucide="truck" class="w-4 h-4 text-primary"></i>
                            <h4 class="text-xs font-black uppercase italic text-slate-900">Metode Pengiriman</h4>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="cursor-pointer">
                                <input type="radio" name="shipMethod" value="pickup" class="hidden peer" checked
                                    onchange="toggleMap(false)">
                                <div
                                    class="p-3 border-2 border-slate-100 rounded-2xl text-center peer-checked:border-aksen peer-checked:bg-teal-50 transition-all font-black text-[10px] uppercase italic text-slate-400 peer-checked:text-aksen">
                                    Ambil Sendiri</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="shipMethod" value="delivery" class="hidden peer"
                                    onchange="toggleMap(true)">
                                <div
                                    class="p-3 border-2 border-slate-100 rounded-2xl text-center peer-checked:border-aksen peer-checked:bg-teal-50 transition-all font-black text-[10px] uppercase italic text-slate-400 peer-checked:text-aksen">
                                    Antar Lokasi</div>
                            </label>
                        </div>

                        <div id="mapSection" class="hidden space-y-4 pt-2">
                            <div id="map"
                                class="w-full h-44 bg-slate-100 rounded-2xl border border-slate-200 overflow-hidden shadow-inner">
                            </div>
                            <textarea id="userAddress" placeholder="Detail Alamat Lengkap"
                                class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold outline-none focus:border-aksen h-20"></textarea>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100">
                        <div class="space-y-3 mb-6">
                            <div class="flex justify-between text-[11px] font-bold">
                                <span class="text-slate-400 uppercase italic">Subtotal Alat</span>
                                <span id="subtotalText" class="text-slate-700 italic">Rp0</span>
                            </div>
                            <div id="ongkirRow" class="hidden justify-between text-[11px] font-bold text-teal-600">
                                <span class="uppercase italic">Biaya Antar</span>
                                <span id="ongkirText">Rp0</span>
                            </div>
                            <div class="flex justify-between items-center pt-2">
                                <span class="text-sm font-black text-slate-900 uppercase italic">Total Akhir</span>
                                <span id="totalAkhirText" class="text-2xl font-black text-primary italic">Rp0</span>
                            </div>
                        </div>

                        <button onclick="submitOrder()"
                            class="w-full bg-primary text-white py-5 rounded-[1.5rem] font-black text-sm tracking-widest btn-cartoon-buy uppercase italic flex items-center justify-center gap-3">
                            <i data-lucide="message-circle" class="w-5 h-5"></i>
                            KONFIRMASI
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const lokasiToko = [-7.4793906, 112.6027756];
        const tarifPerKm = 5000;
        let map, userMarker, ongkir = 0, totalDays = 0;

        // 1. LOGIKA PEMILIHAN DATA (Langsung vs Selektif vs Default)
        const modeCheckout = localStorage.getItem('mode_checkout');
        let keranjang = [];

        if (modeCheckout === 'langsung') {
            // Dari tombol "Sewa Sekarang" di halaman Detail
            keranjang = JSON.parse(localStorage.getItem('checkout_cepat')) || [];
        } else if (modeCheckout === 'selektif') {
            // Dari tombol "Checkout" di Keranjang (Hanya yang dicentang)
            keranjang = JSON.parse(localStorage.getItem('checkout_terpilih')) || [];
        } else {
            // Fallback jika masuk langsung ke checkout
            keranjang = JSON.parse(localStorage.getItem('keranjangSewaIn')) || [];
        }

        function renderCheckoutList() {
            const container = document.getElementById('checkoutList');
            container.innerHTML = '';

            // Tampilkan info mode jika bukan mode normal
            // Ganti bagian ini di dalam renderCheckoutList()
            if (modeCheckout) {
                const label = modeCheckout === 'langsung' ? 'Sewa Sekarang' : 'Sewa Pilihan';
                container.innerHTML = `
    <div class="mb-4 p-3 bg-blue-50 border border-blue-100 rounded-2xl flex justify-between items-center">
        <p class="text-[10px] font-black text-primary uppercase italic">${label}</p>
        <button onclick="batalSewaPilihan()" class="text-[9px] font-black text-red-500 uppercase italic hover:underline">Batal</button>
    </div>
    `;
            }

            if (keranjang.length === 0) {
                container.innerHTML += `<div class="p-10 text-center font-bold text-slate-400 uppercase italic text-xs">Keranjang Kosong</div>`;
                return;
            }

            container.innerHTML += keranjang.map((item, index) => `
        <div class="bg-white rounded-[1.5rem] p-4 border border-slate-100 flex items-center gap-4 shadow-sm mb-3">
            <div class="w-16 h-16 bg-slate-50 rounded-xl flex items-center justify-center flex-none italic font-black text-slate-200 uppercase text-[8px]">Alat</div>
            <div class="flex-1">
                <h4 class="text-xs font-black text-slate-900 uppercase italic">${item.nama}</h4>
                <p class="text-[10px] font-bold text-primary italic">Rp${item.harga.toLocaleString('id-ID')} / hari</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100">
                <button onclick="updateQty(${index}, -1)" class="font-black text-slate-400 hover:text-primary">-</button>
                <span class="text-xs font-black italic w-4 text-center">${item.qty}</span>
                <button onclick="updateQty(${index}, 1)" class="font-black text-slate-400 hover:text-primary">+</button>
            </div>
            <button onclick="hapusItem(${index})" class="text-slate-300 hover:text-red-500 transition-all">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
        </div>
    `).join('');
            lucide.createIcons();
            calculateTotal();
        }

        function calculateDuration() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            if (start && end) {
                const d1 = new Date(start);
                const d2 = new Date(end);
                const diffDays = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
                if (diffDays > 0) {
                    totalDays = diffDays;
                    document.getElementById('durationBadge').classList.remove('hidden');
                    document.getElementById('daysCount').innerText = totalDays;
                } else {
                    alert("Tanggal tidak valid!");
                    document.getElementById('endDate').value = "";
                    totalDays = 0;
                    document.getElementById('durationBadge').classList.add('hidden');
                }
            }
            calculateTotal();
        }

        function updateQty(index, delta) {
            keranjang[index].qty = Math.max(1, keranjang[index].qty + delta);
            saveAndRender();
        }

        function hapusItem(index) {
            if (confirm('Hapus item?')) {
                keranjang.splice(index, 1);
                saveAndRender();
            }
        }

        function saveAndRender() {
            // Simpan data kembali ke storage sementara yang sedang aktif
            const key = modeCheckout === 'langsung' ? 'checkout_cepat' : 'checkout_terpilih';
            localStorage.setItem(key, JSON.stringify(keranjang));
            renderCheckoutList();
        }

        function batalSewaPilihan() {
            // Hapus semua penanda mode checkout
            localStorage.removeItem('mode_checkout');
            localStorage.removeItem('checkout_cepat');
            localStorage.removeItem('checkout_terpilih');

            // Cek: Jika tadi dari "Sewa Sekarang", maka kembali ke halaman sebelumnya (Detail Alat)
            // Jika dari keranjang, kembali ke halaman keranjang
            if (modeCheckout === 'langsung') {
                window.history.back();
            } else {
                window.location.href = 'keranjang.html';
            }
        }

        function calculateTotal() {
            const subtotal = keranjang.reduce((acc, item) => acc + (item.harga * item.qty * (totalDays || 1)), 0);
            document.getElementById('subtotalText').innerText = "Rp" + subtotal.toLocaleString('id-ID');
            document.getElementById('totalAkhirText').innerText = "Rp" + (subtotal + ongkir).toLocaleString('id-ID');
        }

        function toggleMap(show) {
            const mapSec = document.getElementById('mapSection');
            const ongRow = document.getElementById('ongkirRow');
            if (show) {
                mapSec.classList.remove('hidden');
                ongRow.classList.replace('hidden', 'flex');
                setTimeout(() => {
                    if (!map) {
                        map = L.map('map').setView(lokasiToko, 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        L.marker(lokasiToko).addTo(map);
                        map.on('click', onMapClick);
                    }
                    map.invalidateSize();
                }, 200);
            } else {
                mapSec.classList.add('hidden');
                ongRow.classList.replace('flex', 'hidden');
                ongkir = 0;
                calculateTotal();
            }
        }

        function onMapClick(e) {
            if (userMarker) userMarker.setLatLng(e.latlng);
            else userMarker = L.marker(e.latlng, { draggable: true }).addTo(map);
            calculateDistance(e.latlng);
        }

        async function calculateDistance(latlng) {
            const url = `https://router.project-osrm.org/route/v1/driving/${lokasiToko[1]},${lokasiToko[0]};${latlng.lng},${latlng.lat}?overview=false`;
            try {
                const resp = await fetch(url);
                const data = await resp.json();
                const km = data.routes[0].distance / 1000;
                ongkir = Math.ceil(km) * tarifPerKm;
                document.getElementById('ongkirText').innerText = "Rp" + ongkir.toLocaleString('id-ID');
                calculateTotal();
            } catch (e) { console.error(e); }
        }

        function submitOrder() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            if (!name || !phone || !start || !end) return alert('Lengkapi data diri & periode!');
            if (keranjang.length === 0) return alert('Pilih alat dulu!');

            let listBarang = keranjang.map(item => `- ${item.nama} (${item.qty} unit)`).join('%0A');
            const totalBayar = document.getElementById('totalAkhirText').innerText;

            const text = `*Halo Admin SewaIn*,%0A%0ASaya ingin menyewa alat:%0A${listBarang}%0A%0A*Detail:*%0A- Nama: ${name}%0A- WA: ${phone}%0A- Periode: ${start} s/d ${end}%0A- Total: ${totalBayar}`;

            // MEMBERSIHKAN KERANJANG UTAMA (Hapus barang yang sudah dipesan saja)
            let keranjangUtama = JSON.parse(localStorage.getItem('keranjangSewaIn')) || [];
            // Saring keranjang utama, buang barang yang ada di daftar 'keranjang' checkout saat ini
            const idDipesan = keranjang.map(item => item.id);
            keranjangUtama = keranjangUtama.filter(item => !idDipesan.includes(item.id));

            localStorage.setItem('keranjangSewaIn', JSON.stringify(keranjangUtama));

            // Hapus mode checkout sementara
            localStorage.removeItem('mode_checkout');
            localStorage.removeItem('checkout_cepat');
            localStorage.removeItem('checkout_terpilih');

            window.open(`https://wa.me/6287776600292?text=${text}`, '_blank');
        }

        window.onload = () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').setAttribute('min', today);
            document.getElementById('endDate').setAttribute('min', today);

            // LOGIKA AUTO-FILL PROFIL
            const userData = JSON.parse(localStorage.getItem('userSewaIn'));
            if (userData) {
                // Isi input nama dan telepon secara otomatis
                document.getElementById('userName').value = userData.nama;
                document.getElementById('userPhone').value = userData.telepon;

                // Buat input jadi sedikit transparan atau beri tanda kalau ini data profil
                document.getElementById('userName').classList.add('bg-slate-100');
                document.getElementById('userPhone').classList.add('bg-slate-100');
            }

            renderCheckoutList();
        };
    </script>
</body>

</html>
