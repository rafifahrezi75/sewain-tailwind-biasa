<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Sewa - SewaIn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
        }

        .cartoon-accent-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 0.05);
            border: 1.5px solid #E2E8F0;
        }

        .btn-cartoon-buy {
            box-shadow: 4px 4px 0px 0px #1E3A8A;
            transition: all 0.2s;
        }

        .btn-cartoon-buy:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px #1E3A8A;
        }

        .text-primary {
            color: #1E3A8A;
        }

        .bg-primary {
            background-color: #1E3A8A;
        }
    </style>
</head>

<body class="pb-20">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="alatUser.php"
                class="flex items-center gap-2 text-slate-500 hover:text-primary transition-all font-bold uppercase italic text-xs">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                <span>Kembali Belanja</span>
            </a>
            <span class="text-sm font-black text-slate-900 tracking-tighter uppercase italic">Keranjang Saya</span>
            <div class="w-8"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="flex flex-col lg:flex-row gap-10">

            <div class="flex-1">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-black text-slate-900 uppercase italic">Daftar Alat</h2>
                    <button onclick="clearCart()"
                        class="text-[10px] font-black text-red-400 hover:text-red-600 uppercase italic">
                        Kosongkan Keranjang
                    </button>
                </div>

                <div id="cartItemsContainer" class="space-y-4">
                </div>
            </div>

            <div class="w-full lg:w-[380px]">
                <div class="bg-white rounded-[2.5rem] p-8 cartoon-accent-shadow sticky top-24">
                    <h3 class="font-black text-slate-900 mb-6 text-xs uppercase italic tracking-wider">Ringkasan Pesanan
                    </h3>

                    <div class="space-y-4 mb-8">
                        <div class="flex justify-between text-xs font-bold">
                            <span class="text-slate-400 uppercase italic">Total Item</span>
                            <span id="totalUnitText" class="text-slate-700 italic">0 Unit</span>
                        </div>
                        <div class="pt-4 border-t border-slate-100 flex justify-between items-center">
                            <span class="text-sm font-black text-slate-900 uppercase italic">Estimasi Biaya</span>
                            <span id="finalTotalText" class="text-2xl font-black text-primary italic">Rp0</span>
                        </div>
                    </div>

                    <button onclick="lanjutKeCheckout()"
                        class="w-full bg-primary text-white py-5 rounded-2xl font-black text-xs tracking-widest btn-cartoon-buy uppercase italic">
                        LANJUT KE CHECKOUT
                    </button>

                    <div class="mt-6 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                        <p class="text-[10px] text-blue-700 font-bold italic leading-relaxed">
                            💡 Kamu akan mengisi detail alamat dan metode pengiriman di halaman selanjutnya.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // 1. Ambil data, pastikan setiap item punya status 'terpilih' secara default
        let keranjang = JSON.parse(localStorage.getItem('keranjangSewaIn')) || [];

        // Fungsi inisialisasi agar semua barang punya field terpilih (default: true)
        function initKeranjang() {
            keranjang = keranjang.map(item => ({
                ...item,
                terpilih: item.terpilih !== undefined ? item.terpilih : true
            }));
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItemsContainer');
            if (keranjang.length === 0) {
                container.innerHTML = `
                <div class="bg-white rounded-[2.5rem] p-20 text-center border border-dashed border-slate-200">
                    <i data-lucide="shopping-cart" class="w-16 h-16 text-slate-100 mx-auto mb-4"></i>
                    <p class="text-slate-400 font-bold italic uppercase text-sm">Keranjangmu masih kosong</p>
                    <a href="alatUser.php" class="text-primary font-black text-xs uppercase italic mt-2 inline-block underline">Cari Alat Sekarang</a>
                </div>
            `;
                lucide.createIcons();
                updateSummary();
                return;
            }

            container.innerHTML = keranjang.map((item, index) => `
            <div class="bg-white rounded-3xl p-5 border ${item.terpilih ? 'border-primary shadow-md' : 'border-slate-100 opacity-70'} flex flex-col md:flex-row items-center gap-6 shadow-sm transition-all">
                
                <div class="flex-none">
                    <input type="checkbox" 
                        ${item.terpilih ? 'checked' : ''} 
                        onchange="togglePilih(${index})"
                        class="w-6 h-6 accent-primary cursor-pointer border-2 border-black">
                </div>

                <div class="w-20 h-20 bg-slate-50 rounded-2xl flex items-center justify-center flex-none">
                    <i data-lucide="package" class="w-8 h-8 text-slate-200"></i>
                </div>
                
                <div class="flex-1 text-center md:text-left">
                    <h4 class="font-black text-slate-900 text-sm italic uppercase">${item.nama}</h4>
                    <p class="text-primary font-black text-xs italic">Rp${item.harga.toLocaleString('id-ID')}/hari</p>
                </div>

                <div class="flex items-center gap-4 bg-slate-50 p-2 rounded-xl border border-slate-100">
                    <button onclick="updateQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-primary font-black text-lg">-</button>
                    <span class="text-xs font-black text-slate-900 w-6 text-center italic">${item.qty}</span>
                    <button onclick="updateQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-primary font-black text-lg">+</button>
                </div>

                <div class="text-right flex flex-col items-center md:items-end gap-2">
                     <p class="text-sm font-black text-slate-900 italic">Rp${(item.harga * item.qty).toLocaleString('id-ID')}</p>
                     <button onclick="hapusItem(${index})" class="text-red-300 hover:text-red-500 transition-colors">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                     </button>
                </div>
            </div>
        `).join('');

            lucide.createIcons();
            updateSummary();
        }

        // FUNGSI BARU: Toggle Centang
        function togglePilih(index) {
            keranjang[index].terpilih = !keranjang[index].terpilih;
            saveData();
        }

        function updateQty(index, delta) {
            keranjang[index].qty += delta;
            if (keranjang[index].qty < 1) keranjang[index].qty = 1;
            saveData();
        }

        function hapusItem(index) {
            if (confirm('Hapus item ini?')) {
                keranjang.splice(index, 1);
                saveData();
            }
        }

        function clearCart() {
            if (confirm('Kosongkan semua item di keranjang?')) {
                keranjang = [];
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('keranjangSewaIn', JSON.stringify(keranjang));
            renderCartItems();
        }

        function updateSummary() {
            // Hanya hitung yang diceklis (terpilih)
            const barangTerpilih = keranjang.filter(item => item.terpilih);
            const total = barangTerpilih.reduce((acc, item) => acc + (item.harga * item.qty), 0);
            const units = barangTerpilih.reduce((acc, item) => acc + item.qty, 0);

            document.getElementById('totalUnitText').innerText = units + " Unit Terpilih";
            document.getElementById('finalTotalText').innerText = "Rp" + total.toLocaleString('id-ID');
        }

        function lanjutKeCheckout() {
            // Filter barang yang hanya dicentang
            const barangSiapCheckout = keranjang.filter(item => item.terpilih);

            if (barangSiapCheckout.length === 0) {
                return alert('Pilih minimal satu alat untuk disewa!');
            }

            // Simpan data pilihan ke storage sementara untuk dibaca halaman checkout
            localStorage.setItem('checkout_terpilih', JSON.stringify(barangSiapCheckout));
            localStorage.setItem('mode_checkout', 'selektif');

            window.location.href = 'checkout.html';
        }

        // Jalankan init saat loading
        window.onload = initKeranjang;
    </script>
</body>

</html>
